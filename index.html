<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShadowPoint Button Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      max-width: 700px;
      margin: 0 auto;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: gold;
      color: black;
      font-weight: bold;
    }
    #msg {
      margin-top: 12px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>SHADOWPOINT BUTTON TEST</h1>
    <p id="top">START</p>

    <button onclick="alert('BUTTON CLICKED'); document.getElementById('msg').innerText='Button works';">Tap Me</button>

    <div id="msg">Waiting.</div>
  </div>

  <script>
    document.getElementById('top').innerText = 'SCRIPT RAN';
  </script>
</body>
</html>
