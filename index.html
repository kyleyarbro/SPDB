<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowPoint DEBUG</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background: #0b0b0b; color: white; padding: 15px; }
input, button { width:100%; padding:12px; margin:6px 0; font-size:16px; }
button { background: gold; color:black; font-weight:bold; }
.card { background:#151515; padding:15px; border-radius:10px; }
</style>
</head>

<body>

<div class="card">
<h2>DEBUG DASHBOARD</h2>
<p>If you see this, GitHub updated correctly.</p>
</div>

<div class="card">
<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>
<button onclick="magic()">Magic Link</button>

<p id="msg"></p>
</div>

<script>
const supabase = window.supabase.createClient(
"https://hulcxftmoazrvkjqqyuk.supabase.co",
"sb_publishable_yFa3GaBBsHYn-VfK8ivRJQ__vuu_q2T"
);

alert("DEBUG PAGE LOADED");

async function login(){
alert("LOGIN CLICKED");

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabase.auth.signInWithPassword({
email,
password
});

if(error){
alert("LOGIN FAILED: " + error.message);
document.getElementById("msg").innerText = error.message;
}else{
alert("LOGIN SUCCESS");
document.getElementById("msg").innerText = "Logged in";
}
}

async function magic(){
alert("MAGIC CLICKED");

const email = document.getElementById("email").value;

const { error } = await supabase.auth.signInWithOtp({
email,
options: {
emailRedirectTo: "https://kyleyarbro.github.io/SPDB/"
}
});

if(error){
alert("MAGIC FAILED: " + error.message);
}else{
alert("MAGIC SENT");
}
}
</script>

</body>
</html>
