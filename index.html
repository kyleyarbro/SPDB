<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShadowPoint Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: gold;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>SHADOWPOINT TEST</h1>
  <p id="status">If JavaScript works, this text will change.</p>
  <button onclick="testClick()">Tap Me</button>

  <script>
    document.getElementById('status').textContent = 'JavaScript is running.';
    alert('TEST PAGE LOADED');

    function testClick() {
      alert('BUTTON WORKS');
      document.getElementById('status').textContent = 'Button click works.';
    }
  </script>
</body>
</html>
